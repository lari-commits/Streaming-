<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Netflix</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family: Arial, Helvetica, sans-serif;
  background:#141414;
  color:#fff;
}

/* topo estilo Netflix */
.nav{
  position:fixed;
  top:0;
  width:100%;
  padding:20px 40px;
  font-size:30px;
  font-weight:bold;
  color:#e50914;
}

/* fundo estilo Netflix */
.bg{
  height:100vh;
  background:linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.4)),
  url("https://i.imgur.com/8Km9tLL.jpg") center/cover;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* card login */
.card{
  background:rgba(0,0,0,0.75);
  padding:40px;
  border-radius:6px;
  width:320px;
}

.card h1{
  margin-bottom:20px;
}

.card input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:none;
  border-radius:4px;
  background:#333;
  color:#fff;
}

.card button{
  width:100%;
  padding:12px;
  background:#e50914;
  border:none;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

/* tela loading */
#loading{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  color:#fff;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.loader{
  border:5px solid #333;
  border-top:5px solid #e50914;
  border-radius:50%;
  width:60px;
  height:60px;
  animation:spin 1s linear infinite;
  margin-bottom:20px;
}

@keyframes spin{
  100%{transform:rotate(360deg);}
}

/* final */
#final{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:#fff;
  color:#000;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}
</style>
</head>

<body>

<div class="nav">NETFLIX</div>

<div class="bg" id="main">
  <div class="card">
    <h1>Entrar</h1>
    <input placeholder="Email ou telefone">
    <input type="password" placeholder="Senha">
    <button onclick="start()">Entrar</button>
  </div>
</div>

<div id="loading">
  <div class="loader"></div>
  <h2>Verificando acesso...</h2>
</div>

<div id="final">
  <h1>😂 PEGADINHA</h1>
  <h2>1º DE ABRIL</h2>
  <button onclick="location.reload()">Voltar</button>
</div>

<script>

function start(){

  document.getElementById("main").style.display="none";
  document.getElementById("loading").style.display="flex";

  setTimeout(()=>{
    document.getElementById("loading").style.display="none";
    document.getElementById("final").style.display="flex";
  },4000);
}

</script>

</body>
</html>
