<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso Liberado - Box Chanel</title>
  <style>
    body { font-family: sans-serif; text-align: center; background: #000; color: #fff; margin: 0; overflow: hidden; }
    .card { background: #111; padding: 30px; border-radius: 20px; border: 2px solid #e50914; max-width: 350px; margin: 80px auto; }
    button { background: #e50914; color: white; border: none; padding: 20px; font-size: 18px; border-radius: 50px; cursor: pointer; width: 100%; font-weight: bold; }
    
    /* Tela de Vírus */
    #panic { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; color: red; padding: 20px; text-align: left; font-family: monospace; }
    .blink { animation: flash 0.2s infinite; font-size: 25px; text-align: center; margin-bottom: 20px; }
    @keyframes flash { 50% { opacity: 0; } }

    /* O SUSTO */
    #screamer { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 10000; }
    #screamer img { width: 100%; height: 100%; object-fit: cover; }

    /* TELA FINAL */
    #final { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; color: #000; z-index: 10001; flex-direction: column; justify-content: center; align-items: center; }
  </style>
</head>
<body>

  <div id="main">
    <div class="card">
      <h1 style="color:#e50914">🎬 ACESSO GRÁTIS</h1>
      <p>Libere Netflix e Disney+ agora.</p>
      <button onclick="comecar()">ATIVAR ACESSO</button>
    </div>
  </div>

  <div id="panic">
    <div class="blink">⚠️ SISTEMA INVADIDO!</div>
    <p>> Baixando fotos da galeria...</p>
    <p>> Enviando senhas salvas...</p>
    <p style="font-size: 30px; font-weight: bold;">LIMPANDO HD: <span id="perc">0</span>%</p>
  </div>

  <div id="screamer">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR6A6R_N1v_D_Xy1IayC5iX_8F6-fIAtR5a_w&s">
  </div>

  <div id="final">
    <h1 style="font-size: 80px; margin:0;">🤡</h1>
    <h1 style="font-size: 40px;">PEGADINHA!</h1>
    <h2 style="color:red;">1º DE ABRIL</h2>
    <p>Calma, foi só uma brincadeira! 😂</p>
    <button style="background:#000; width:auto; padding: 10px 30px;" onclick="location.reload()">SAIR</button>
  </div>

  <script>
    // Link de áudio de grito (MP3 direto)
    const grito = new Audio("https://www.myinstants.com/media/sounds/screamer-1.mp3");

    function comecar() {
      // O segredo: tocar e pausar o som no clique inicial "libera" o áudio no celular
      grito.play().then(() => { grito.pause(); grito.currentTime = 0; });

      document.getElementById('main').style.display = 'none';
      document.getElementById('panic').style.display = 'block';

      let p = 0;
      let interval = setInterval(() => {
        p += 4;
        document.getElementById('perc').innerText = p;
        if (p >= 100) {
          clearInterval(interval);
          setTimeout(atacar, 300);
        }
      }, 100);
    }

    function atacar() {
      const telaSusto = document.getElementById('screamer');
      telaSusto.style.display = 'block';
      
      grito.volume = 1.0;
      grito.play();

      if (navigator.vibrate) navigator.vibrate([1000, 500, 1000]);

      // Mostra o final depois de 3 segundos de susto
      setTimeout(() => {
        telaSusto.style.display = 'none';
        document.getElementById('panic').style.display = 'none';
        document.getElementById('final').style.display = 'flex';
      }, 3000);
    }
  </script>
</body>
</html>
